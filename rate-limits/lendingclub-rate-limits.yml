specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: LendingClub
providerId: lendingclub
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Fintech
  - Personal Loans
  - Banking
description: LendingClub does not publish public API rate-limit documentation. Per-key, per-IP, and concurrency
  limits are governed by the partner agreement and the LendingClub WAF / API gateway in front of api.lendingclub.com.
  Sandbox vs production differences, header conventions, and burst behavior must be confirmed with LendingClub.
notes: No public rate-limit documentation found. Limits below describe the policy surface; numeric ceilings
  must be confirmed with LendingClub via partner channels.
sources:
  - https://www.lendingclub.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner API Limit
    scope: api-key
    metric: varies
    limit: see partner agreement
    notes: Numeric per-second/per-minute ceilings are not published; refer to your partner contract.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor any Retry-After header
      returned by the gateway.
  - name: Partner-Specific Limits
    description: Quotas and burst behavior are negotiated per partner agreement; raise via the LendingClub
      API support channel.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

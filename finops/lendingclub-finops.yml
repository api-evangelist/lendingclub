specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: LendingClub
providerId: lendingclub
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Fintech
  - Personal Loans
  - Banking
description: 'FOCUS-aligned FinOps scaffold for LendingClub: partner / contract-based API access with
  no public per-call pricing, so consumer-side spend allocation tracks against the contracted partner
  or treasury services agreement.'
notes: Pricing is contract-driven and not self-serve; meters below describe the consumer-side telemetry
  shape and should be reconciled against the executed partner agreement.
sources:
  - https://www.lendingclub.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LendingClub Corporation
serviceCategory: Financial Services / API
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: LendingClub API
  ServiceCategory: Financial Services / API
  ProviderName: LendingClub
  PublisherName: LendingClub Corporation
  InvoiceIssuerName: LendingClub Corporation
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - environment
      - partner
  - name: contract_fees
    unit: month
    aggregation: sum
    dimensions:
      - contract
principles:
  - name: Visibility
    description: Track API call volume and partner-contract draw-down through your own gateway / observability
      stack; LendingClub does not expose a public usage API.
  - name: Allocation
    description: Tag outbound calls by business unit (loans, banking, investor) so contracted spend can
      be charged back to the consuming team.
  - name: Optimization
    description: Batch institutional investor data pulls and cache static reference data to stay within
      contracted volumes and avoid renegotiation.
  - name: Accountability
    description: Assign a single contract owner per LendingClub partner agreement and review consumption
      against contracted volume monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
